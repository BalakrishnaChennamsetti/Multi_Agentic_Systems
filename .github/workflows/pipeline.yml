name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Start Pipeline
        run: echo "🚀 CI/CD Pipeline started"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Complete
        run: echo "📥 Code checked out successfully"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Setup Complete
        run: echo "🐍 Python 3.12 environment ready"

      - name: Install dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install -r requirements.txt
          echo "✅ Dependencies installed successfully"

      - name: Stricter Security check with pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict
          echo "✅ Security audit completed successfully"

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table

      - name: Code Formatting Check (Isort)
        run: |
          pip install isort
          isort --check-only src/

      - name: Code Formatting (Black)
        run: |
          pip install black
          black --check src/

      - name: Run Linting (Code Quality Check)
        run: |
          pip install flake8
          flake8 src/

      - name: Run docker compose for all services
        env:
          GEMMA4_ENDPOINT: ${{ secrets.GEMMA4_ENDPOINT }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.agents.yml up -d --build

      - name: Cleanup containers
        run: |
          docker stop fastapi streamlit || true
          docker rm fastapi streamlit || true

      - name: Pipeline Completed
        run: echo "🎉 Build completed successfully"

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          pip install pytest pytest-cov
          python -m pytest src/test/gemma_systems/unit --cov=src/main/gemma_system --cov-report=term-missing -v

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-test, unit-tests]

    environment:
      name: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Development Environment
        run: |
          echo "🚀 Deploying to development environment..."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          git checkout -B dev

          git push --force-with-lease origin dev

          echo "✅ Development deployment completed successfully"
