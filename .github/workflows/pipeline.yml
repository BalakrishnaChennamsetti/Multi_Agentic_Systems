name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Start Pipeline
        run: echo "🚀 CI/CD Pipeline started"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Complete
        run: echo "📥 Code checked out successfully"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Setup Complete
        run: echo "🐍 Python 3.12 environment ready"

      - name: Install dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install -r requirements.txt
          echo "✅ Dependencies installed successfully"

      - name: Code Formatting Check (Isort)
        run: |
          echo "🧹 Running import sorting with isort..."
          pip install isort
          isort --check-only src/
          echo "✅ Import sorting completed successfully"

      - name: Code Formatting (Black)
        run: |
          echo "🖌️ Running code formatting with Black..."
          pip install black
          black --check src/
          echo "✅ Code formatting completed successfully"

      - name: Run Linting (Code Quality Check)
        run: |
          echo "🔍 Starting linting process..."
          pip install flake8
          flake8 src/
          echo "✅ Linting completed successfully"

      - name: Build FastAPI Docker image
        run: |
          echo "🐳 Building FastAPI Docker image..."
          docker build -t gemma-fastapi -f deploy/docker/Dockerfile.FastAPI .
          echo "✅ FastAPI image built successfully"

      - name: Build Streamlit Docker image
        run: |
          echo "🐳 Building Streamlit Docker image..."
          docker build -t gemma-streamlit -f deploy/docker/Dockerfile.Streamlit .
          echo "✅ Streamlit image built successfully"

      - name: Run FastAPI container (Test Stage)
        run: |
          echo "🚀 Starting FastAPI container..."
          docker run -d -p 8000:8000 --name fastapi gemma-fastapi
          sleep 5
          echo "🔎 Checking FastAPI health..."
          curl http://localhost:8000/docs || (echo "❌ FastAPI failed" && exit 1)
          echo "✅ FastAPI is healthy"

      - name: Run Streamlit container (Smoke Test)
        run: |
          echo "🚀 Starting Streamlit container..."
          docker run -d -p 8501:8501 --name streamlit gemma-streamlit
          sleep 5
          echo "🔎 Checking Streamlit health..."
          curl http://localhost:8501 || (echo "❌ Streamlit failed" && exit 1)
          echo "✅ Streamlit is healthy"

      - name: Cleanup containers
        run: |
          echo "🧹 Cleaning up containers..."
          docker stop fastapi streamlit || true
          docker rm fastapi streamlit || true
          echo "✅ Cleanup completed successfully"

      - name: Pipeline Completed
        run: echo "🎉 CI/CD Pipeline finished successfully"
