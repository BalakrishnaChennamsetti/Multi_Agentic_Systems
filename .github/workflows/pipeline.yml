name: CI/CD Pipeline

on:
  push:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Start Pipeline
        run: echo "🚀 CI/CD Pipeline started"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Complete
        run: echo "📥 Code checked out successfully"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Setup Complete
        run: echo "🐍 Python 3.12 environment ready"

      - name: Install dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install -r requirements.txt
          echo "✅ Dependencies installed successfully"

      - name: Stricter Security check with pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict
          echo "✅ Security audit completed successfully"

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table

      - name: Code Formatting Check (Isort)
        run: |
          echo "🧹 Running import sorting with isort..."
          pip install isort
          isort --check-only src/
          echo "✅ Import sorting completed successfully"

      - name: Code Formatting (Black)
        run: |
          echo "🖌️ Running code formatting with Black..."
          pip install black
          black --check src/
          echo "✅ Code formatting completed successfully"

      - name: Run Linting (Code Quality Check)
        run: |
          echo "🔍 Starting linting process..."
          pip install flake8
          flake8 src/
          echo "✅ Linting completed successfully"

      - name: Run docker compose for all services
        env:
          GEMMA4_ENDPOINT: ${{ secrets.GEMMA4_ENDPOINT }}
        run: |
          echo "🐳 Starting all services with docker-compose..."
          docker compose -f docker-compose.yml -f docker-compose.agents.yml up -d --build
          echo "✅ All services started successfully"

      - name: Cleanup containers
        run: |
          echo "🧹 Cleaning up containers..."
          docker stop fastapi streamlit || true
          docker rm fastapi streamlit || true
          echo "✅ Cleanup completed successfully"

      - name: Pipeline Completed
        run: echo "🎉 Build completed successfully"

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          echo "📦 Installing Python dependencies for unit tests..."
          pip install -r requirements.txt
          echo "✅ Dependencies installed successfully"

      - name: Run Unit Tests
        run: |
          echo "🧪 Running Unit Tests with Coverage..."
          pip install pytest pytest-cov
          python -m pytest src/test/gemma_systems/unit --cov=src/main/gemma_system --cov-report=term-missing -v
          echo "✅ Unit tests completed successfully"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build-test, unit-tests]

    environment:
      name: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Development Environment
        run: |
          echo "🚀 Deploying to development environment..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B dev

          git push origin dev
          echo "✅ Deployment completed successfully"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build-test, unit-tests, deploy-dev]

    if: github.event_name == 'workflow_dispatch'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production Environment
        run: |
          echo "🚀 Deploying to production environment..."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B prod
          git push origin prod

          echo "✅ Deployment completed successfully"
